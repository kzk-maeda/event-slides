name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @slidev/cli @slidev/theme-default

      - name: Build slides
        run: |
          set -e
          mkdir -p dist
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          for dir in [0-9]*/; do
            dir="${dir%/}"

            # Find main markdown file
            mdfile=""
            for candidate in main.md index.md slidev.md slide.md; do
              [ -f "$dir/$candidate" ] && mdfile="$dir/$candidate" && break
            done
            [ -z "$mdfile" ] && echo "No markdown in $dir, skipping" && continue

            # Marp: frontmatter has "marp: true" (allow spaces around colon)
            if grep -qm1 "^marp\s*:.*true" "$mdfile" 2>/dev/null; then
              echo "=== Building Marp: $dir ==="
              mkdir -p "dist/$dir"
              npx marp "$mdfile" --html -o "dist/$dir/index.html"
              [ -d "$dir/images" ] && cp -r "$dir/images" "dist/$dir/"

            # Slidev: has components/ directory or "theme:" in frontmatter
            elif [ -d "$dir/components" ] || grep -qm1 "^theme:" "$mdfile" 2>/dev/null; then
              echo "=== Building Slidev: $dir ==="
              npx slidev build "$mdfile" --base "/$REPO_NAME/$dir/" --out "$(pwd)/dist/$dir"

            else
              echo "Skipping $dir (unrecognized type)"
            fi
          done

      - name: Generate index page
        run: |
          node << 'EOF'
          const fs = require('fs');
          const dirs = fs.readdirSync('dist')
            .filter(d => {
              try {
                return fs.statSync(`dist/${d}`).isDirectory() && fs.existsSync(`dist/${d}/index.html`);
              } catch { return false; }
            })
            .sort();

          const links = dirs
            .map(d => `      <li><a href="${d}/">${d}</a></li>`)
            .join('\n');

          const html = `<!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Event Slides</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #0969da; font-size: 1.1rem; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Event Slides</h1>
            <ul>
          ${links}
            </ul>
          </body>
          </html>`;

          fs.writeFileSync('dist/index.html', html);
          console.log(`Generated index.html with ${dirs.length} entries: ${dirs.join(', ')}`);
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
